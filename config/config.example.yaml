# config/config.example.yaml
# 复制此文件为 config.yaml，并修改为你的真实配置

database:
  name: your_database_name      # 改成你的数据库名，例如：testdb3
  user: your_database_user      # 改成你的数据库用户名，例如：root
  password: ${DB_PASSWORD}      # 在 .env 文件里设置 DB_PASSWORD
  host: localhost               # 数据库地址
  port: 3306                    # MySQL 默认端口
  dialect: mysql                # 数据库类型
  pool:
    max: 5                      # 最大连接数
    min: 0                      # 最小连接数
    acquire: 30000              # 获取连接超时（毫秒）
    idle: 10000                 # 空闲连接超时（毫秒）

server:
  port: 3003                    # 服务器端口

jwt:
  secret: ${JWT_SECRET}         # 在 .env 文件里设置 JWT_SECRET
  expiresIn: 2h                 # 令牌有效期

logging:
  level: info                   # 日志级别：debug, info, warn, error
  sql: true                     # 是否打印 SQL 语句（开发时 true，生产时 false）

feishu:
  botWebhook: ${FEISHU_BOT_WEBHOOK} # 飞书群机器人webhook