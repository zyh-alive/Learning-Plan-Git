# config/config.example.yaml
# 复制为 config.yaml：仅业务配置（端口、JWT、日志、飞书等）。
# 数据库连接仅写在 config/config.json（可复制 config.example.json），由 config/index.js 与 sequelize-cli 共用。

server:
  port: your_port               # 服务器端口

jwt:
  secret: ${JWT_SECRET}         # 在 .env 文件里设置 JWT_SECRET
  expiresIn: 2h                 # 令牌有效期

logging:
  level: info                   # 日志级别：debug, info, warn, error
  sql: true                     # 是否打印 SQL 语句（开发时 true，生产时 false）

feishu:
  botWebhook: ${FEISHU_BOT_WEBHOOK} # 飞书群机器人webhook
  enableMorningBrief: ${ENABLE_FEISHU_MORNING} # 1 开启早间播报
  morningHour: ${FEISHU_MORNING_HOUR}
  morningMinute: ${FEISHU_MORNING_MINUTE}
