<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金币中心</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            padding: 20px 16px 32px;
        }
        .back {
            display: inline-block;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 15px;
            margin-bottom: 20px;
        }
        .back:hover { color: #fff; }
        .balance-hero {
            border-radius: 20px;
            padding: 32px 24px 28px;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 45%, #f093fb 100%);
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
            text-align: center;
            max-width: 400px;
            margin: 0 auto 28px;
        }
        .balance-hero .label {
            font-size: 14px;
            color: rgba(0,0,0,0.55);
            font-weight: 600;
            letter-spacing: 0.08em;
        }
        .balance-hero .amount {
            font-size: 42px;
            font-weight: 800;
            color: #1a1a1a;
            margin: 10px 0 4px;
            letter-spacing: -0.02em;
        }
        .balance-hero .unit { font-size: 16px; font-weight: 600; color: rgba(0,0,0,0.45); }
        .actions {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .action-card {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 22px 22px;
            background: rgba(255,255,255,0.96);
            border-radius: 16px;
            text-decoration: none;
            color: #1a1a1a;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .action-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.18);
        }
        .action-card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .action-card.recharge .icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .action-card.history .icon { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .action-card.withdraw .icon { background: linear-gradient(135deg, #ff9a56, #ff4d4f); }
        .action-card.withdraw-hist .icon { background: linear-gradient(135deg, #fa8c16, #d4380d); }
        .action-card .text h3 { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
        .action-card .text p { margin: 0; font-size: 13px; color: #888; }
        .action-card .arrow { margin-left: auto; color: #ccc; font-size: 22px; }
        .err { color: #ffb4b4; text-align: center; padding: 40px; max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>
    <a class="back" href="profile.html" id="backProfile">← 返回个人资料</a>
    <div class="balance-hero" id="hero">
        <div class="label">金币余额</div>
        <div class="amount" id="balanceNum">--</div>
        <div class="unit">枚金币</div>
    </div>
    <div class="actions" id="actions">
        <a class="action-card recharge" href="recharge.html" id="linkRecharge">
            <div class="icon">💰</div>
            <div class="text">
                <h3>充值金币</h3>
                <p>为账户增加金币（仅客户）</p>
            </div>
            <span class="arrow">›</span>
        </a>
        <a class="action-card history" href="recharge-history.html" id="linkRechargeHist">
            <div class="icon">📜</div>
            <div class="text">
                <h3>充值记录</h3>
                <p>查看历史充值明细（仅客户）</p>
            </div>
            <span class="arrow">›</span>
        </a>
        <a class="action-card withdraw" href="withdraw.html" id="linkWithdraw">
            <div class="icon">💸</div>
            <div class="text">
                <h3>提现金币</h3>
                <p>从账户扣除金币并记账</p>
            </div>
            <span class="arrow">›</span>
        </a>
        <a class="action-card withdraw-hist" href="withdraw-history.html" id="linkWithdrawHist">
            <div class="icon">📋</div>
            <div class="text">
                <h3>提现记录</h3>
                <p>查看历史提现明细</p>
            </div>
            <span class="arrow">›</span>
        </a>
    </div>
    <p class="err" id="err" style="display:none;"></p>
    <script>
        var token = localStorage.getItem('token');
        var embedQs = new URLSearchParams(window.location.search).get('embed') === '1' ? '?embed=1' : '';
        if (embedQs) {
            document.getElementById('backProfile').href = 'profile.html' + embedQs;
            ['linkRecharge', 'linkRechargeHist', 'linkWithdraw', 'linkWithdrawHist'].forEach(function (id) {
                var el = document.getElementById(id);
                if (!el) return;
                var base = el.getAttribute('href').split('?')[0];
                el.setAttribute('href', base + embedQs);
            });
        }
        function getRole() {
            try {
                var b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                var p = JSON.parse(decodeURIComponent(escape(atob(b64))));
                if (p.role) return p.role;
            } catch (e) {}
            return localStorage.getItem('role') || 'user';
        }
        function formatCoin(v) {
            if (v == null || v === '') return '0.00';
            var n = Number(v);
            if (!Number.isFinite(n)) return '0.00';
            return n.toFixed(2);
        }
        var walletRole = String(getRole() || 'user').toLowerCase();
        if (!token) location.href = 'login.html';
        else if (walletRole !== 'user' && walletRole !== 'consultant') location.href = 'dashboard.html';
        else {
            if (walletRole === 'consultant') {
                document.getElementById('linkRecharge').style.display = 'none';
                document.getElementById('linkRechargeHist').style.display = 'none';
            }
            fetch(window.location.origin + '/api/transaction/balance', {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(function (r) { return r.json().then(function (d) { return { r: r, d: d }; }); })
            .then(function (x) {
                if (x.r.status === 401 || x.r.status === 403) {
                    localStorage.removeItem('token');
                    location.href = 'login.html';
                    return;
                }
                if (!x.r.ok) {
                    document.getElementById('actions').style.display = 'none';
                    document.getElementById('hero').style.display = 'none';
                    var e = document.getElementById('err');
                    e.style.display = 'block';
                    e.textContent = x.d.message || '加载失败';
                    return;
                }
                var c = x.d.data && x.d.data.coin;
                document.getElementById('balanceNum').textContent = formatCoin(c);
            }).catch(function () {
                document.getElementById('balanceNum').textContent = '?';
            });
        }
    </script>
</body>
</html>
