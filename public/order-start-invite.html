<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认开始服务</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            background: linear-gradient(160deg, #2d1b4e 0%, #1a1a2e 50%, #16213e 100%);
            padding: 24px 16px;
            color: #fff;
        }
        .card {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            border-radius: 16px;
            padding: 28px 22px;
            color: #333;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        h1 { margin: 0 0 8px; font-size: 20px; color: #1a1a2e; text-align: center; }
        .sub { text-align: center; font-size: 13px; color: #888; margin-bottom: 22px; }
        .row { font-size: 15px; margin-bottom: 12px; line-height: 1.5; }
        .row strong { color: #555; display: inline-block; min-width: 72px; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .actions button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-agree {
            background: linear-gradient(135deg, #52c41a, #389e0d);
            color: #fff;
        }
        .btn-reject {
            background: #f5f5f5;
            color: #cf1322;
        }
        .btn-agree:disabled, .btn-reject:disabled { opacity: 0.5; }
        .err { text-align: center; color: #cf1322; padding: 20px; }
        .back { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.85); font-size: 14px; }
    </style>
</head>
<body>
    <div class="card" id="main">
        <h1>顾问邀请开始服务</h1>
        <p class="sub" id="sub">请确认是否同意开始本次服务</p>
        <div id="content"></div>
        <div class="actions" id="actions" style="display:none;">
            <button type="button" class="btn-reject" id="btnReject">拒绝</button>
            <button type="button" class="btn-agree" id="btnAgree">同意开始</button>
        </div>
    </div>
    <a class="back" href="my-orders.html">← 返回我的订单</a>

    <script>
        var API = window.location.origin;
        var token = localStorage.getItem('token');
        var id = parseInt(new URLSearchParams(location.search).get('id'), 10);

        function getRole() {
            try {
                var b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(escape(atob(b64)))).role || 'user';
            } catch (e) { return 'user'; }
        }

        if (!token) location.href = 'login.html';
        else if (getRole() !== 'user') location.href = 'dashboard.html';
        else if (!id) {
            document.getElementById('content').innerHTML = '<p class="err">无效的订单链接</p>';
        } else {
            (async function () {
                var res = await fetch(API + '/api/order/detail/' + id, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                var data = await res.json();
                if (!res.ok) {
                    document.getElementById('content').innerHTML = '<p class="err">' + (data.message || '加载失败') + '</p>';
                    return;
                }
                var d = data.data || {};
                if (d.status !== 'start_invited') {
                    document.getElementById('content').innerHTML =
                        '<p class="err">当前无需确认（状态：' + (d.status || '--') + '）</p>' +
                        '<p style="text-align:center;font-size:14px;color:#666">若已处理，请返回订单列表查看。</p>';
                    return;
                }
                var cname = d.consultantName ? d.consultantName : ('顾问 #' + d.consultantId);
                document.getElementById('content').innerHTML =
                    '<div class="row"><strong>顾问</strong>' + cname + '</div>' +
                    '<div class="row"><strong>服务类型</strong>' + (d.serviceType || '--') + '</div>' +
                    '<div class="row"><strong>需求说明</strong></div><div style="font-size:14px;color:#666;background:#f9f9f9;padding:10px;border-radius:8px">' +
                    (d.serviceContent || '无') + '</div>' +
                    '<p style="font-size:13px;color:#888;text-align:center;margin-top:16px;line-height:1.6">拒绝将取消本订单，已付金额将退回您的账户</p>';
                document.getElementById('actions').style.display = 'flex';

                async function submit(agree) {
                    var ba = document.getElementById('btnAgree');
                    var br = document.getElementById('btnReject');
                    ba.disabled = br.disabled = true;
                    try {
                        var r = await fetch(API + '/api/order/' + id + '/respond-start', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + token
                            },
                            body: JSON.stringify({ agree: agree })
                        });
                        var j = await r.json();
                        if (!r.ok) {
                            alert(j.message || '操作失败');
                            ba.disabled = br.disabled = false;
                            return;
                        }
                        alert(j.message || '已提交');
                        if (agree) {
                            try {
                                sessionStorage.setItem('orderChatReturnPanel', 'slot2');
                            } catch (e) {}
                            location.href = 'order-chat.html?orderId=' + id + '&returnPanel=slot2';
                        } else {
                            location.href = 'my-orders.html';
                        }
                    } catch (e) {
                        alert('网络错误');
                        ba.disabled = br.disabled = false;
                    }
                }
                document.getElementById('btnAgree').onclick = function () { submit(true); };
                document.getElementById('btnReject').onclick = function () {
                    if (confirm('拒绝后订单将取消，确定吗？')) submit(false);
                };
            })();
        }
    </script>
</body>
</html>
